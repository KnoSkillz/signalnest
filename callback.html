<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Nest — Authorization Complete</title>
<style>
  body { max-width: 600px; margin: 80px auto; padding: 0 20px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: #eee; background: #111; line-height: 1.7; text-align: center; }
  .check { font-size: 64px; margin-bottom: 20px; }
  h1 { color: #00d4ff; font-size: 1.6em; }
  p { color: #aaa; }
  .code { background: #1a1a2e; color: #00d4ff; padding: 12px 20px; border-radius: 6px; font-family: monospace; word-break: break-all; margin: 20px 0; }
</style>
</head>
<body>
<div class="check">✅</div>
<h1>Authorization Complete</h1>
<p>Signal Nest News has been authorized with TikTok.</p>
<p>You may close this window and return to your application.</p>
<div class="code" id="code"></div>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
if (code) {
  document.getElementById('code').textContent = 'Auth Code: ' + code;
}
</script>
</body>
</html>
